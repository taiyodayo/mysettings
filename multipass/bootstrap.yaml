#cloud-config
groups:
  - docker                        # pre-create so users_groups stage can join it

users:
  - default
  - name: taiyo
    shell: /bin/bash
    groups: [sudo, docker]
    sudo: 'ALL=(ALL) NOPASSWD:ALL'
__TAIYO_PASSWORD__
    ssh_authorized_keys:
__SSH_AUTHORIZED_KEYS__

packages:
  - avahi-daemon
  - git
  - tmux
  - zsh
  - wireguard

write_files:
  - path: /etc/netplan/55-br0-route-metric.yaml
    permissions: '0644'
    content: |
      network:
        version: 2
        ethernets:
          extra0:
            dhcp4-overrides:
              route-metric: 50
  # Enable systemd-resolved mDNS so the libnss-mdns SOA-probe for `local.`
  # gets an instant negative from resolved. Without this, resolved tries
  # to forward `local.` to upstream DNS (multipass internal at 10.247.x.1)
  # which silently drops, glibc waits 2x5s, and every `.local` lookup
  # eats 10s before falling through to avahi.
  # `resolve` mode = resolution only; avahi-daemon stays in charge of
  # publishing the VM's hostname.
  - path: /etc/systemd/resolved.conf.d/10-mdns-resolve.conf
    permissions: '0644'
    content: |
      [Resolve]
      MulticastDNS=resolve
  - path: /etc/systemd/network/10-netplan-default.network.d/mdns.conf
    permissions: '0644'
    content: |
      [Network]
      MulticastDNS=resolve
  - path: /etc/systemd/network/10-netplan-extra0.network.d/mdns.conf
    permissions: '0644'
    content: |
      [Network]
      MulticastDNS=resolve

runcmd:
  - netplan apply
  - systemctl restart systemd-networkd
  - systemctl restart systemd-resolved
  # Install Claude Code (native installer) for taiyo. Drops `claude` at
  # /home/taiyo/.local/bin/claude. Done in cloud-init (not the kit
  # playbook) so the VM has working `claude` on first login — before the
  # operator has run any further setup.
  - sudo -u taiyo -H bash -lc 'curl -fsSL https://claude.ai/install.sh | bash' || true
  # Prepare for the credentials mount that launch_vm.sh sets up after
  # `multipass launch` completes. Symlinks ~/.claude/.credentials.json
  # into the host-mounted directory so `claude` is already-authorised the
  # first time it runs. The mount target /home/taiyo/host-claude/ won't
  # exist yet at cloud-init time (the mount happens post-launch) — the
  # symlink stays dangling until then, then resolves. claude only reads
  # credentials on first use, so order doesn't matter as long as the
  # mount lands before the user invokes `claude` interactively.
  - sudo -u taiyo -H mkdir -p /home/taiyo/.claude
  - sudo -u taiyo -H ln -sfn /home/taiyo/host-claude/.credentials.json /home/taiyo/.claude/.credentials.json
