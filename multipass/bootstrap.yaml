#cloud-config
groups:
  - docker                        # pre-create so users_groups stage can join it

users:
  - default
  - name: taiyo
    shell: /bin/bash
    groups: [sudo, docker]
    sudo: 'ALL=(ALL) NOPASSWD:ALL'
__TAIYO_PASSWORD__
    ssh_authorized_keys:
__SSH_AUTHORIZED_KEYS__

packages:
  - avahi-daemon
  - git
  - tmux
  - zsh
  - wireguard

write_files:
  - path: /etc/netplan/55-br0-route-metric.yaml
    permissions: '0644'
    content: |
      network:
        version: 2
        ethernets:
          extra0:
            dhcp4-overrides:
              route-metric: 50

runcmd:
  - netplan apply
