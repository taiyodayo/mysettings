---
# Declarative replacement for ubuntu/my_ubuntu_setup.sh.
#
# Usage:
#   cd automated
#   make bootstrap                   # one-time: install collections
#   make kit                         # full ubuntu kitting (sudo prompted)
#
# Override the user that owns brew / mise / uv / ~/.zshrc with
#   -e target_user=foo

- name: Ubuntu server kitting — system layer
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Invoking user, NOT the become user. `ansible_user_id` gets clobbered
    # to "root" when gather_facts runs with become: true. lookup('env', …)
    # evaluates on the controller in the invoker's context, ignoring become.
    target_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
    mysettings_repo_dir: "{{ playbook_dir | dirname }}"
    base_packages:
      - zsh
      - avahi-daemon
      - parallel
      - wireguard-tools
      - nkf
      - iftop
      - iotop
      - rclone
      - lm-sensors
      - build-essential
      - pkg-config
      - libssl-dev
      - gpg
      - software-properties-common
      - dirmngr
      # snapd is required by the `Install yq via snap` task below. Ubuntu
      # Server full images ship it, but minimal images don't — pin it so the
      # kit playbook is self-sufficient regardless of how ansible got here
      # (i.e. works even when the user took the `make collections` shortcut
      # instead of `make bootstrap`).
      - snapd
      # Modern CLI tooling — apt-installable on 24.04+.
      # cargo-only equivalents (du-dust, jless, zellij, qsv) live in the
      # userland block; yq (mikefarah/yq) goes via snap.
      - bat
      - eza
      - ripgrep
      - jq
      - fd-find
      - zoxide
      - git-delta
      - duf
      - btop
      - hyperfine
      - tealdeer
      - sd
      - procs
    # R-DS preload. Lands in /usr/lib/R/site-library — every user sees
    # these the moment they type `R`. Personal extras go to ~/R/...
    # via install.packages() as usual (and via bspm if running as root
    # or sudo, otherwise source compile).
    r_apt_packages:
      - r-cran-tidyverse
      - r-cran-pacman
      - r-cran-data.table
      - r-cran-arrow
      - r-cran-jsonlite
      - r-cran-readxl
      - r-cran-rmarkdown
      - r-cran-knitr
      - r-cran-devtools
      - r-cran-renv
      - r-cran-languageserver
      - r-cran-httpgd
    # gs 10 has a PDF mojibake bug for Japanese — pin to the patched 9.55 build.
    ghostscript_pinned: "9.55.0~dfsg1-0ubuntu5.4"

  tasks:
    # ---- base packages, timezone, sysctl ----

    - name: Install base apt packages
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    # Debian/Ubuntu rename bat → batcat and fd-find → fdfind to dodge long-dead
    # package-name conflicts. Restore upstream-documented command names.
    - name: Symlink /usr/local/bin/bat → /usr/bin/batcat
      ansible.builtin.file:
        src: /usr/bin/batcat
        dest: /usr/local/bin/bat
        state: link

    - name: Symlink /usr/local/bin/fd → /usr/bin/fdfind
      ansible.builtin.file:
        src: /usr/bin/fdfind
        dest: /usr/local/bin/fd
        state: link

    # yq (mikefarah/yq, Go-based YAML processor) — apt ships python-yq under
    # the same name, which is a different tool. snap is upstream's distribution
    # channel for the Go binary.
    - name: Install yq via snap
      community.general.snap:
        name: yq
        state: present
      # Tolerant: snapd may not be ready immediately after install on
      # minimal images, or may be unavailable in containers (LXD/Docker).
      # Other apt-managed tools are unaffected — let the playbook continue.
      register: snap_yq
      ignore_errors: true

    - name: Warn if yq snap install failed
      ansible.builtin.debug:
        msg: "WARNING: yq snap install failed — continuing without yq. Install manually later: snap install yq"
      when: snap_yq.failed | default(false)

    # Purge apt rustc/cargo BEFORE the per-user rustup install in the user
    # block — otherwise apt's rustc/cargo (under /usr/bin) can shadow
    # ~/.cargo/bin depending on rc ordering. Idempotent — succeeds even when
    # the packages aren't installed. (Ubuntu 26.04+ ships uutils + sudo-rs
    # as system binaries; those aren't dev toolchains and are left alone.)
    - name: Purge apt rustc/cargo (rustup installs per-user toolchain later)
      ansible.builtin.apt:
        name: [rustc, cargo]
        state: absent
        purge: true

    - name: Set timezone to Asia/Tokyo
      community.general.timezone:
        name: Asia/Tokyo

    - name: Tune vm.swappiness
      ansible.posix.sysctl:
        name: vm.swappiness
        value: "10"
        sysctl_file: /etc/sysctl.conf
        state: present
        reload: true

    # ---- mise (apt repo) ----

    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Fetch mise apt signing key
      ansible.builtin.get_url:
        url: https://mise.jdx.dev/gpg-key.pub
        dest: /etc/apt/keyrings/mise-archive-keyring.asc
        mode: "0644"
        force: false

    - name: Dearmor mise key
      ansible.builtin.command:
        cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/mise-archive-keyring.gpg /etc/apt/keyrings/mise-archive-keyring.asc
        creates: /etc/apt/keyrings/mise-archive-keyring.gpg

    - name: Add mise apt repo
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.gpg arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}] https://mise.jdx.dev/deb stable main"
        filename: mise
        state: present

    - name: Install mise
      ansible.builtin.apt:
        name: mise
        state: present
        update_cache: true

    # ---- gh (GitHub CLI from cli.github.com) ----
    # Ubuntu-shipped gh lags upstream; always prefer the official apt repo.
    # Mirrors https://github.com/cli/cli/blob/trunk/docs/install_linux.md

    - name: Fetch gh apt signing key
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        mode: "0644"
        force: false

    - name: Add gh apt repo
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        filename: github-cli
        state: present

    - name: Install gh
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: true

    # ---- Dart SDK (Google apt repo) ----
    # Needed for Flutter Version Manager (fvm) via `dart pub global activate`
    # in the userland block. Replaces linuxbrew dart-sdk + fvm on Linux.
    # 詳細: https://dart.dev/get-dart

    - name: Install apt-transport-https (Dart repo prereq)
      ansible.builtin.apt:
        name: apt-transport-https
        state: present

    - name: Fetch Google linux signing key (for Dart)
      ansible.builtin.get_url:
        url: https://dl-ssl.google.com/linux/linux_signing_key.pub
        dest: /etc/apt/keyrings/dart.asc
        mode: "0644"
        force: false

    - name: Dearmor Dart key
      ansible.builtin.command:
        cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/dart.gpg /etc/apt/keyrings/dart.asc
        creates: /etc/apt/keyrings/dart.gpg

    - name: Add Dart apt repo
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/dart.gpg arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}] https://storage.googleapis.com/download.dartlang.org/linux/debian stable main"
        filename: dart_stable
        state: present

    - name: Install dart
      ansible.builtin.apt:
        name: dart
        state: present
        update_cache: true

    # ---- docker (docker-ce from Docker Inc, not docker.io) ----
    # Ubuntu's docker.io lags several major versions by mid-LTS cycle.
    # docker-ce is on a current release cadence and is what the lab wants.
    # On hosts with docker.io already installed AND running containers,
    # migration is gated on `force_docker_migration=true` so we don't
    # silently bounce production containers on a re-kit. Storage in
    # /var/lib/docker survives the engine swap; containers without
    # --restart=always do NOT auto-restart after migration.

    - name: Detect existing docker.io install
      ansible.builtin.command: dpkg-query -W -f='${Status}' docker.io
      register: docker_io_status
      failed_when: false
      changed_when: false

    - name: Detect running containers (only if docker.io present)
      ansible.builtin.shell: docker ps --format '{{ "{{" }}.Names{{ "}}" }}' 2>/dev/null || true
      register: docker_running
      changed_when: false
      when: docker_io_status.stdout is search('install ok installed')

    - name: Decide whether to migrate docker.io → docker-ce
      ansible.builtin.set_fact:
        do_docker_migration: >-
          {{
            (docker_io_status.stdout is not search('install ok installed'))
            or ((docker_running.stdout | default('') | trim) == '')
            or (force_docker_migration | default(false) | bool)
          }}

    - name: Warn when skipping migration (running containers present)
      ansible.builtin.debug:
        msg: |
          *** docker-ce migration SKIPPED ***
          docker.io is installed with running container(s):
            {{ docker_running.stdout_lines | default([]) | join(', ') }}
          Migration would purge docker.io → install docker-ce, briefly
          stopping all containers (those without --restart=always will NOT
          auto-restart). Re-run with -e force_docker_migration=true once
          containers are quiesced or you accept the brief downtime.
      when: not do_docker_migration

    - name: Purge legacy Docker packages (docker.io + bundled siblings)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-doc
          - docker-compose
          - docker-compose-v2
          - podman-docker
          - containerd
          - runc
        state: absent
        purge: true
      when: do_docker_migration

    - name: Install ca-certificates + curl (for Docker apt key fetch)
      ansible.builtin.apt:
        name: [ca-certificates, curl]
        state: present
      when: do_docker_migration

    - name: Fetch Docker apt signing key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false
      when: do_docker_migration

    - name: Add Docker apt repo
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable
        filename: docker
        state: present
      when: do_docker_migration

    - name: Install docker-ce + plugins
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      when: do_docker_migration

    - name: Add target user to docker group
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups: docker
        append: true

    - name: Enable and start docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ---- mailab CA cert (so docker/curl trust *.local / *.mai over TLS) ----

    - name: Install mailab root CA into system trust store
      ansible.builtin.copy:
        src: "{{ mysettings_repo_dir }}/certs/mailab_root_ca.crt"
        dest: /usr/local/share/ca-certificates/mailab_root_ca.crt
        owner: root
        group: root
        mode: "0644"
      register: mailab_ca

    - name: Update CA certificates
      ansible.builtin.command: update-ca-certificates
      when: mailab_ca.changed

    - name: Restart docker after CA update
      ansible.builtin.systemd:
        name: docker
        state: restarted
      when: mailab_ca.changed

    # ---- netdata ----
    # netdata was removed from Ubuntu's universe repo in 24.04 (noble) and
    # later — apt install can't find it. Use netdata's official kickstart.sh
    # which sets up netdata's own apt repo and installs from there. Works on
    # 22.04, 24.04, 26.04. Idempotent via stat check on the binary.

    - name: Check if netdata is already installed
      ansible.builtin.stat:
        path: /usr/sbin/netdata
      register: netdata_check

    - name: Install netdata via official kickstart
      # --non-interactive: no prompts (CI / kitting-safe)
      # --stable-channel: stable release (not nightly)
      # --disable-telemetry: don't phone home anonymously
      # --dont-wait: don't block waiting for the service to settle
      # No --claim-* flags → no registration with netdata cloud
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://get.netdata.cloud/kickstart.sh \
          | bash -s -- --non-interactive --stable-channel --disable-telemetry --dont-wait
      args:
        executable: /bin/bash
      when: not netdata_check.stat.exists
      # Tolerant: netdata is a nice-to-have monitor, not a hard kitting
      # dep. Kickstart can fail on minimal images / containers / network
      # blips; let the rest of the playbook complete.
      register: netdata_install
      ignore_errors: true

    - name: Warn if netdata install failed
      ansible.builtin.debug:
        msg: "WARNING: netdata install failed — continuing without it. Re-run kit or `curl -fsSL https://get.netdata.cloud/kickstart.sh | bash` later."
      when: netdata_install.failed | default(false)

    # ---- R via r2u (binary CRAN packages from Ubuntu apt) ----
    # r2u only ships repos for current Ubuntu LTS. The whole block is gated
    # on is_lts; non-LTS hosts get a skip message and no R is installed.
    # https://eddelbuettel.github.io/r2u/

    - name: Read /etc/os-release to detect LTS
      ansible.builtin.slurp:
        src: /etc/os-release
      register: os_release_raw

    - name: Set is_lts fact
      ansible.builtin.set_fact:
        is_lts: "{{ 'LTS' in (os_release_raw.content | b64decode) }}"

    - name: Skip R install on non-LTS
      ansible.builtin.debug:
        msg: >-
          Skipping r2u-based R install — {{ ansible_facts['distribution'] }}
          {{ ansible_facts['distribution_version'] }} is not LTS. r2u supports LTS only.
      when: not is_lts

    - name: Install R via r2u
      when: is_lts
      block:
        - name: Install r2u signing key
          ansible.builtin.get_url:
            url: https://eddelbuettel.github.io/r2u/assets/dirk_eddelbuettel_key.asc
            dest: /etc/apt/trusted.gpg.d/cranapt_key.asc
            mode: "0644"
            force: false

        - name: Add r2u apt repo (r-cran-* binary debs)
          ansible.builtin.apt_repository:
            repo: "deb [arch=amd64] https://r2u.stat.illinois.edu/ubuntu {{ ansible_facts['distribution_release'] }} main"
            filename: cranapt
            state: present
            update_cache: false

        # The Marutter CRAN repo is required alongside r2u: r2u's r-cran-*
        # packages depend on a current r-base-core (>=4.5.0) which only
        # this repo provides — Ubuntu defaults still ship 4.3.3.
        - name: Install Marutter CRAN signing key
          ansible.builtin.get_url:
            url: https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc
            dest: /etc/apt/trusted.gpg.d/cran_ubuntu_key.asc
            mode: "0644"
            force: false

        - name: Add Marutter CRAN apt repo (current r-base / r-base-core)
          ansible.builtin.apt_repository:
            repo: "deb https://cloud.r-project.org/bin/linux/ubuntu {{ ansible_facts['distribution_release'] }}-cran40/"
            filename: cran_r
            state: present
            update_cache: true

        # Single Pin: line per stanza — apt-preferences silently ignores
        # extras, which is what was breaking r2u priority earlier.
        - name: Pin r2u over default Ubuntu r-cran-* packages
          ansible.builtin.copy:
            dest: /etc/apt/preferences.d/99cranapt
            mode: "0644"
            content: |
              Package: *
              Pin: release o=CRAN-Apt Project
              Pin-Priority: 700

        # ONE apt transaction: r-base + bspm + lab-DS preload. Splitting
        # this into multiple installs lets a partial run leave R installed
        # without bspm, which makes the next install.packages() / pacman::
        # p_load() in any R session source-compile from CRAN.
        #
        # r2u's CDN is occasionally flaky (SSL EOF mid-download). Retry up
        # to 3 times with 30s back-off so a single bad packet doesn't kill
        # the whole R install. If retries are exhausted, ignore_errors lets
        # the rest of the playbook complete — the operator can rerun later
        # to pick R up.
        - name: Install r-base + bspm + lab-DS preload (one transaction)
          ansible.builtin.apt:
            name: "{{ ['r-base', 'r-base-dev',
                       'python3-dbus', 'python3-gi', 'python3-apt',
                       'r-cran-bspm'] + r_apt_packages }}"
            state: present
            install_recommends: false
            update_cache: true
          register: r_apt_install
          until: r_apt_install is success
          retries: 3
          delay: 30
          ignore_errors: true

        # If the r-base/bspm install failed (even after retries), skip the
        # rest of the R block — the wrapper + Rprofile.site only make sense
        # when R is actually installed. The whole R section becomes a no-op
        # and a warning, leaving the operator to re-run later.
        - name: Warn if R install failed (skipping R wrapper / Rprofile setup)
          ansible.builtin.debug:
            msg: "WARNING: r2u apt install failed after retries — skipping r-install wrapper + Rprofile.site setup. Re-run kit later to pick R up."
          when: r_apt_install.failed | default(false)

        # Deploy the r-install wrapper + r-installers group + sudoers rule
        # so non-root users can install r-cran-* packages system-wide via
        # `sudo r-install ...`. The wrapper enforces the r-cran-* whitelist;
        # the sudoers entry grants NOPASSWD ONLY on the wrapper.
        - name: Deploy r-install wrapper to /usr/local/bin
          ansible.builtin.copy:
            src: "{{ mysettings_repo_dir }}/cli_tools/r-install.sh"
            dest: /usr/local/bin/r-install
            owner: root
            group: root
            mode: "0755"
          when: not (r_apt_install.failed | default(false))

        - name: Ensure r-installers group exists
          ansible.builtin.group:
            name: r-installers
            state: present
          when: not (r_apt_install.failed | default(false))

        - name: Drop sudoers rule for r-install wrapper
          ansible.builtin.copy:
            dest: /etc/sudoers.d/r-installers
            owner: root
            group: root
            mode: "0440"
            content: |
              # Members of r-installers may run /usr/local/bin/r-install
              # without password. The wrapper enforces the r-cran-* whitelist
              # and never allows removal.
              %r-installers ALL=(root) NOPASSWD: /usr/local/bin/r-install
            validate: visudo -cf %s
          when: not (r_apt_install.failed | default(false))

        - name: Add target user to r-installers
          ansible.builtin.user:
            name: "{{ target_user }}"
            groups: r-installers
            append: true
          when: not (r_apt_install.failed | default(false))

        # /etc/R/Rprofile.site: root-only bspm + install_apt() helper for
        # everyone. Plain install.packages() in non-root sessions is
        # untouched (source compile to user lib).
        - name: Strip any flat-style bspm lines from older script versions
          ansible.builtin.lineinfile:
            path: /etc/R/Rprofile.site
            regexp: "{{ item }}"
            state: absent
          loop:
            - '^suppressMessages\(bspm::enable\(\)\)'
            - '^options\(bspm\.version\.check=FALSE\)'
          when: not (r_apt_install.failed | default(false))

        - name: Strip older mysettings-bspm marker block
          ansible.builtin.blockinfile:
            path: /etc/R/Rprofile.site
            marker: "# {mark} ANSIBLE MANAGED BLOCK - mysettings bspm"
            state: absent
          when: not (r_apt_install.failed | default(false))

        # Strip the older Ansible-default-style marker that earlier versions
        # of this playbook wrote. Without this, hosts that ran a previous
        # version end up with both blocks side-by-side after a re-kit.
        - name: Strip older Ansible-style mysettings R config marker block
          ansible.builtin.blockinfile:
            path: /etc/R/Rprofile.site
            marker: "# {mark} ANSIBLE MANAGED BLOCK - mysettings R config"
            state: absent
          when: not (r_apt_install.failed | default(false))

        # Marker format matches what cli_tools/check_r.sh greps for
        # (`# === BEGIN mysettings R config ===`). Without this exact shape
        # check_r.sh reports the block as missing even though it's present.
        - name: Configure /etc/R/Rprofile.site (bspm + install_apt helper)
          when: not (r_apt_install.failed | default(false))
          ansible.builtin.blockinfile:
            path: /etc/R/Rprofile.site
            create: true
            mode: "0644"
            marker: "# === {mark} mysettings R config ==="
            block: |
              # Root R: bspm enabled → install.packages() via apt to system lib.
              if (Sys.info()[["effective_user"]] == "root") {
                  options(bspm.sudo = TRUE)
                  options(bspm.version.check = FALSE)
                  suppressMessages(bspm::enable())
              }

              # install_apt(): binary system install via the r-install wrapper.
              # Works for users in r-installers group; plain install.packages()
              # remains untouched and goes to ~/R/.../ via source compile.
              install_apt <- function(...) {
                  pkgs <- unlist(list(...))
                  if (length(pkgs) == 0L) stop("install_apt: no packages given")
                  if (any(grepl("[^a-zA-Z0-9._-]", pkgs))) {
                      stop("install_apt: package names must be alphanumeric / . _ -")
                  }
                  apt_names <- paste0("r-cran-", tolower(gsub("[._]", "-", pkgs)))
                  cat("install_apt: sudo r-install ", paste(apt_names, collapse = " "), "\n", sep = "")
                  rc <- system2("sudo", c("-n", "/usr/local/bin/r-install", apt_names))
                  invisible(rc == 0L)
              }

        - name: Verify R install (bspm + preloaded packages)
          ansible.builtin.command: "{{ mysettings_repo_dir }}/cli_tools/check_r.sh"
          register: r_check
          changed_when: false
          failed_when: false
          when: not (r_apt_install.failed | default(false))

        - name: Show R check output
          ansible.builtin.debug:
            var: r_check.stdout_lines
          when: not (r_apt_install.failed | default(false))

        - name: Warn if check_r.sh reported issues
          ansible.builtin.debug:
            msg: "WARNING: check_r.sh exited non-zero — R is installed but the bspm/preload sanity check found issues. See output above."
          when:
            - not (r_apt_install.failed | default(false))
            - (r_check.rc | default(0)) != 0

    # ---- pinned ghostscript + ImageMagick 7 ----
    # gs 10 has a PDF mojibake bug for Japanese; pin to 9.55.
    # Ubuntu 26.04+ ships ImageMagick 7 in apt, so no IMEI source build needed.

    - name: Install pinned ghostscript, PDF tools, and ImageMagick
      ansible.builtin.apt:
        name:
          - "ghostscript={{ ghostscript_pinned }}"
          - qpdf
          - mupdf
          - imagemagick
        state: present
        allow_downgrade: true


- name: Ubuntu server kitting — user layer
  hosts: all
  become: true
  gather_facts: false

  vars:
    # Invoking user, NOT the become user. `ansible_user_id` gets clobbered
    # to "root" when gather_facts runs with become: true. lookup('env', …)
    # evaluates on the controller in the invoker's context, ignoring become.
    target_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
    user_home: "/home/{{ target_user }}"
    git_user_name: "taiyo@{{ ansible_facts['hostname'] }} default"
    git_user_email: "taiyodayo@gmail.com"

  tasks:
    # linuxbrew is DEPRECATED on Linux. apt + curl-pipe-sh covers everything
    # (gh, mise, bat, eza, rustup, uv, claude-native, bun). Linuxbrew creates
    # a parallel package universe at /home/linuxbrew/ that shadows our
    # canonical installs via PATH ordering — caught by check_tools.sh. We
    # detect existing installs and print the uninstall command; never auto-
    # remove (the user may have local state they care about).
    - name: Detect deprecated linuxbrew install
      ansible.builtin.stat:
        path: /home/linuxbrew/.linuxbrew/bin/brew
      register: linuxbrew_stat

    - name: Warn about deprecated linuxbrew
      ansible.builtin.debug:
        msg: |
          *** linuxbrew is deprecated ***
          /home/linuxbrew/.linuxbrew/bin/brew detected. We no longer install
          linuxbrew during kitting (apt + curl-pipe-sh covers our tools).
          To remove (recommended):
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/uninstall.sh)"
          Existing installs still work but tools should migrate to
          apt / curl-pipe-sh. Run cli_tools/check_tools.sh anytime to see
          the warning + recommended action.
      when: linuxbrew_stat.stat.exists

    - name: Activate mise + add cli_tools / ~/.local/bin to PATH in ~/.zshrc
      become_user: "{{ target_user }}"
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.zshrc"
        create: true
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - mise + PATH"
        block: |
          eval "$(mise activate zsh)"
          export PATH="$HOME/mysettings/cli_tools:$PATH"
          export PATH="$HOME/.local/bin:$PATH"

    - name: Set global mise node version to lts
      become_user: "{{ target_user }}"
      ansible.builtin.command: mise use --global node@lts
      register: mise_use
      changed_when: "'already' not in (mise_use.stderr | default(''))"
      environment:
        PATH: "{{ user_home }}/.local/bin:/usr/bin:/bin"

    - name: Install uv (astral.sh) for target user
      become_user: "{{ target_user }}"
      ansible.builtin.shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: "{{ user_home }}/.local/bin/uv"

    # bun — JavaScript runtime + package manager. cli_tools/llms_update.sh
    # uses `bun add -g` for codex/gemini, so bun must be on PATH before that.
    # Installer is idempotent (upgrades in place), but we gate on creates: for
    # cleaner Ansible reporting.
    - name: Install bun for target user
      become_user: "{{ target_user }}"
      ansible.builtin.shell: curl -fsSL https://bun.sh/install | bash
      args:
        creates: "{{ user_home }}/.bun/bin/bun"

    # rustup — per-user Rust toolchain in ~/.cargo. apt rustc/cargo were purged
    # in the system block above so they can't shadow ~/.cargo/bin.
    - name: Install rustup for target user
      become_user: "{{ target_user }}"
      ansible.builtin.shell: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y --default-toolchain stable
      args:
        creates: "{{ user_home }}/.cargo/bin/rustup"

    - name: Update rustup + stable toolchain
      become_user: "{{ target_user }}"
      ansible.builtin.shell: |
        . "{{ user_home }}/.cargo/env"
        rustup self update
        rustup update stable
      args:
        executable: /bin/bash
      changed_when: false

    # cargo-installed CLIs not packaged in apt. `cargo install` is idempotent
    # (skips when the requested version is already installed; rebuilds only on
    # upgrade). --locked uses the crate's pinned Cargo.lock.
    # Tolerant per-item: each cargo install is heavy (qsv ≈ 10 min, can OOM
    # on small VMs, can fail on missing system libs). A single crate failing
    # shouldn't block the others or the rest of the playbook.
    - name: Install cargo CLIs (git-trim, du-dust, jless, zellij, qsv)
      become_user: "{{ target_user }}"
      ansible.builtin.shell: |
        . "{{ user_home }}/.cargo/env"
        cargo install --locked {{ item.crate }}{{ ' --features ' ~ item.features if item.features is defined else '' }}
      args:
        executable: /bin/bash
        creates: "{{ user_home }}/.cargo/bin/{{ item.binary }}"
      register: cargo_installs
      ignore_errors: true
      loop:
        - { crate: git-trim, binary: git-trim }
        - { crate: du-dust, binary: dust }
        - { crate: jless,   binary: jless }
        - { crate: zellij,  binary: zellij }
        - { crate: qsv,     binary: qsv, features: apply }

    # fvm — Flutter Version Manager. Dart SDK comes from Google's apt repo
    # (system block above). fvm lives at ~/.pub-cache/bin/fvm; dot_zshrc.tmpl
    # picks it up via `[[ -d "$HOME/.pub-cache/bin" ]] && export PATH=...`.
    # Tolerant: fvm is only needed for Flutter work. `fvm install stable`
    # downloads ~500MB and frequently hits network blips. The whole block
    # is non-blocking — kit completes without Flutter on slow/flaky links.
    - name: Activate fvm via dart pub global
      become_user: "{{ target_user }}"
      ansible.builtin.command: dart pub global activate fvm
      args:
        creates: "{{ user_home }}/.pub-cache/bin/fvm"
      environment:
        PATH: "/usr/lib/dart/bin:{{ user_home }}/.pub-cache/bin:/usr/bin:/bin"
      register: fvm_activate
      ignore_errors: true

    - name: Install Flutter stable via fvm
      become_user: "{{ target_user }}"
      ansible.builtin.command: fvm install stable
      args:
        creates: "{{ user_home }}/fvm/versions/stable"
      environment:
        PATH: "{{ user_home }}/.pub-cache/bin:/usr/lib/dart/bin:/usr/bin:/bin"
      when: not (fvm_activate.failed | default(false))
      register: fvm_install
      ignore_errors: true

    - name: Set Flutter stable as fvm global default
      become_user: "{{ target_user }}"
      ansible.builtin.command: fvm global stable
      args:
        creates: "{{ user_home }}/fvm/default"
      environment:
        PATH: "{{ user_home }}/.pub-cache/bin:/usr/lib/dart/bin:/usr/bin:/bin"
      when: not (fvm_install.failed | default(false))
      register: fvm_global
      ignore_errors: true

    - name: Warn if fvm install failed
      ansible.builtin.debug:
        msg: "WARNING: fvm/Flutter install failed — continuing. Re-run kit or `fvm install stable && fvm global stable` later."
      when: (fvm_activate.failed | default(false)) or (fvm_install.failed | default(false)) or (fvm_global.failed | default(false))

    # Git global config. credential.helper=cache keeps HTTPS creds in memory
    # for 15 min — prefer over `store` so an accidental PAT paste during
    # `git clone https://...` never hits disk. SSH-based auth is unaffected.
    # alias.sync depends on git-trim (installed via cargo above).
    - name: Configure global git settings
      become_user: "{{ target_user }}"
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - { name: user.name,         value: "{{ git_user_name }}" }
        - { name: user.email,        value: "{{ git_user_email }}" }
        - { name: credential.helper, value: "cache" }
        - { name: fetch.prune,       value: "true" }
        - { name: fetch.pruneTags,   value: "true" }
        - { name: pull.rebase,       value: "true" }
        - { name: alias.sync,        value: "!git fetch --all --prune && git trim --no-confirm" }

    # ---- post-kit health checks ----
    # Run as target_user. Both scripts are read-only by default and report
    # status only — never fail the playbook. Final stdout shows up in the
    # play recap so the operator sees auth/tool-canonicalness right away.

    - name: Run login_check.sh (gh / claude / codex / gemini auth status)
      become_user: "{{ target_user }}"
      ansible.builtin.command: "{{ user_home }}/mysettings/cli_tools/login_check.sh"
      register: login_check
      changed_when: false
      failed_when: false
      environment:
        PATH: "{{ user_home }}/mysettings/cli_tools:{{ user_home }}/.local/bin:{{ user_home }}/.cargo/bin:{{ user_home }}/.bun/bin:{{ user_home }}/.local/share/mise/shims:/usr/local/bin:/usr/bin:/bin"

    - name: Show login_check.sh output
      ansible.builtin.debug:
        var: login_check.stdout_lines

    - name: Run check_tools.sh (canonical-install audit)
      become_user: "{{ target_user }}"
      ansible.builtin.command: "{{ user_home }}/mysettings/cli_tools/check_tools.sh"
      register: check_tools
      changed_when: false
      failed_when: false
      environment:
        PATH: "{{ user_home }}/mysettings/cli_tools:{{ user_home }}/.local/bin:{{ user_home }}/.cargo/bin:{{ user_home }}/.bun/bin:{{ user_home }}/.local/share/mise/shims:/usr/local/bin:/usr/bin:/bin"

    - name: Show check_tools.sh output
      ansible.builtin.debug:
        var: check_tools.stdout_lines
