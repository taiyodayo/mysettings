[defaults]
inventory = inventory.yml
host_key_checking = False
# Built-in default callback with YAML rendering. The old `community.general.yaml`
# callback was removed in community.general 12.0.0; ansible-core 2.13+ has the
# same output via `result_format = yaml` on the default callback.
stdout_callback = default
bin_ansible_callbacks = True
retry_files_enabled = False
forks = 10
interpreter_python = auto_silent

[callback_default]
result_format = yaml

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
