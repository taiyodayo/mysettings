# brew formulae for macOS lab + dev machines.
#
# Read by:
#   - mac/setup_cli_tools.sh  (bash → awk extraction → xargs brew install)
#
# Editing this file is the canonical way to add/remove brew formulae.
# Casks live in darwin_brew_casks.yml; fonts in darwin_brew_fonts.yml.
# R/tidyverse build deps live in darwin_brew_r_build_deps.yml.
#
# Phase 4 moved nine CLI tools off brew — bat, eza, fd, rg, git-delta,
# dust, jless, zellij, qsv now live in ~/.cargo/bin via cargo-binstall
# (see dotfiles/run_onchange_install-rustup-and-cargo-tools.sh). git-trim
# was already cargo-only; now its 9 siblings join it for a uniform Mac+
# Linux modern-CLI surface that tracks upstream releases.

# -- networking + download tools --
- aria2
- mtr
- rclone
- telnet
- wget

# -- build / dev tooling --
- automake
- awscli
- cocoapods
- direnv
- dockutil
- gh
- git
- git-lfs
- google-cloud-sdk
- mas
- ruby
- shellcheck
- subversion

# -- runtime / language managers --
# bun + mise moved to common/install_bun.sh + install_mise.sh (Phase 3),
# so the install path is shared with the Ubuntu kit.
# uv stays here for now; Phase 5 will lift it into common/install_uv.sh
# alongside the ~/p313 venv + lab_python.yml preload.
- uv

# -- GNU userland (Mac ships BSD; we want GNU on PATH) --
- bash
- coreutils
- findutils
- gnu-sed
- gnu-tar
- grep

# -- system libs --
- hdf5
- libuv
- little-cms2
- oath-toolkit
- pigz
- zlib

# -- PDF / imaging --
- graphicsmagick
- imagemagick
- mupdf
- poppler
- qpdf

# -- misc system utils --
- htop
- iftop
- parallel
- pstree
- rename
- tmux
- tree
- unar
- watch
- hexyl

# -- modern CLI staying on brew (cargo route covers the fast-moving ones) --
- btop
- duf
- hyperfine
- jq
- procs
- sd
- tealdeer
- yq
- zoxide
