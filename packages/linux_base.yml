# apt packages for Ubuntu lab servers.
#
# Read by:
#   - ubuntu/my_ubuntu_setup.sh           (bash → awk extraction)
#   - automated/ubuntu_kitting.yml        (Ansible → lookup('file') | from_yaml)
#
# Editing this file is the canonical way to add/remove apt packages.
# See packages/README.md for the consumer recipe.
#
# Phase 4 moved bat, eza, ripgrep, fd-find, git-delta off this list — they
# now live in ~/.cargo/bin via cargo-binstall (see
# dotfiles/run_onchange_install-rustup-and-cargo-tools.sh) so the host
# keeps up with upstream feature releases.

# -- base system --
- zsh
- avahi-daemon
- parallel
- wireguard-tools
- nkf
- iftop
- iotop
- rclone
- lm-sensors
- build-essential
- pkg-config
- libssl-dev

# -- xcb dev headers: jless pulls in clipboard → x11-clipboard → xcb at
#    cargo-build time and fails to link on headless servers without these.
- libxcb1-dev
- libxcb-render0-dev
- libxcb-shape0-dev
- libxcb-xfixes0-dev

# -- apt-repo plumbing prereqs (gpg keys, snap, https transport) --
- gpg
- software-properties-common
- dirmngr
- snapd

# -- modern CLI staying on apt (cargo route covers the fast-moving ones) --
- jq
- zoxide
- duf
- btop
- hyperfine
- tealdeer
- sd
- procs
